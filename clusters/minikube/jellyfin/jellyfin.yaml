apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: ./kompose convert -o jellyfin.yaml
    kompose.version: 1.37.0 (fb0539e64)
  labels:
    io.kompose.service: jellyfin
  name: jellyfin
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: jellyfin
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: ./kompose convert -o jellyfin.yaml
        kompose.version: 1.37.0 (fb0539e64)
      labels:
        io.kompose.service: jellyfin
    spec:
      containers:
        - env:
            - name: JELLYFIN_PublishedServerUrl
              value: http://jellyfin.local
          image: registry.local/jellyfin/jellyfin
          name: jellyfin
          ports:
            - containerPort: 8096
              protocol: TCP
            - containerPort: 7359
              protocol: UDP
          volumeMounts:
            - mountPath: /config
              name: jellyfin-claim0
            - mountPath: /cache
              name: jellyfin-claim1
            - mountPath: /media
              name: jellyfin-claim2
            - mountPath: /media2
              name: jellyfin-claim3
              readOnly: true
            - mountPath: /usr/local/share/fonts/custom
              name: jellyfin-claim4
              readOnly: true
      restartPolicy: Always
      volumes:
        - name: jellyfin-claim0
          persistentVolumeClaim:
            claimName: jellyfin-claim0
        - name: jellyfin-claim1
          persistentVolumeClaim:
            claimName: jellyfin-claim1
        - name: jellyfin-claim2
          persistentVolumeClaim:
            claimName: jellyfin-claim2
        - name: jellyfin-claim3
          persistentVolumeClaim:
            claimName: jellyfin-claim3
            readOnly: true
        - name: jellyfin-claim4
          persistentVolumeClaim:
            claimName: jellyfin-claim4
            readOnly: true
---