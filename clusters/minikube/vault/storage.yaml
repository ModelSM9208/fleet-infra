apiVersion: v1
kind: PersistentVolume
metadata:
  name: data-vault-0
  labels:
    type: nfs
    app: vault
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: 192.168.49.1
    path: /var/mnt/datalake/nfs/vault