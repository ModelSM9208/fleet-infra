apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
spec:
  interval: 1h
  chart:
    spec:
      chart: vault
      version: "0.28.x"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: vault
  values:
    global:
      enabled: true

    server:
      # Production mode - not dev
      dev:
        enabled: false

      # Standalone single node - no HA needed for single host lab
      standalone:
        enabled: true
        config: |
          ui = true

          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }

          storage "file" {
            path = "/vault/data"
          }

      # Reference our pre-created NFS PVC rather than letting Helm create one
      dataStorage:
        enabled: true
        size: 10Gi
        storageClass: nfs
        accessMode: ReadWriteOnce
        mountPath: /vault/data

    # Vault UI enabled - useful for lab
    ui:
      enabled: true
      serviceType: ClusterIP
