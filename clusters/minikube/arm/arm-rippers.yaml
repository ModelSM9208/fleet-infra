apiVersion: apps/v1
kind: Deployment
metadata:
  name: arm-rippers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arm-rippers
  template:
    metadata:
      labels:
        app: arm-rippers
    spec:
      initContainers:
        - name: fix-perms
          image: busybox
          command: ["sh", "-c", "chown -R 1000:1000 /home/arm /etc/arm/config"]
          volumeMounts:
            - name: home-arm
              mountPath: /home/arm
            - name: music
              mountPath: /home/arm/Music
            - name: logs
              mountPath: /home/arm/logs
            - name: media
              mountPath: /home/arm/media
            - name: config
              mountPath: /etc/arm/config
      containers:
        - name: arm-rippers
          image: registry.local/automaticrippingmachine/automatic-ripping-machine:vce
          resources:
            limits:
              amd.com/gpu: 1
          securityContext:
            privileged: true
          ports:
            - containerPort: 8080
          env:
            - name: ARM_UID
              value: "1000"
            - name: ARM_GID
              value: "1000"
          volumeMounts:
            - name: dri
              mountPath: /dev/dri
            - name: home-arm
              mountPath: /home/arm
            - name: music
              mountPath: /home/arm/Music
            - name: logs
              mountPath: /home/arm/logs
            - name: media
              mountPath: /home/arm/media
            - name: config
              mountPath: /etc/arm/config
      volumes:
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: home-arm
          persistentVolumeClaim:
            claimName: arm-home
        - name: music
          persistentVolumeClaim:
            claimName: arm-music
        - name: logs
          persistentVolumeClaim:
            claimName: arm-logs
        - name: media
          persistentVolumeClaim:
            claimName: arm-media
        - name: config
          persistentVolumeClaim:
            claimName: arm-config