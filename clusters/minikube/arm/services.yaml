apiVersion: v1
kind: Service
metadata:
  name: arm-rippers
spec:
  selector:
    app: arm-rippers
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arm-rippers
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - arm.local
      secretName: arm-tls
  rules:
    - host: arm.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: arm-rippers
                port:
                  number: 80