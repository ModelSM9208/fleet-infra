apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate
  namespace: renovate
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: renovate
            image: renovate/renovate:37
            args: ["--autodiscover"]
            env:
            - name: RENOVATE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: renovate-secret
                  key: token
#            - name: RENOVATE_CONFIG_FILE
#              value: "/usr/src/app/config.json"
            - name: LOG_LEVEL
              value: "info"
            volumeMounts:
            - name: config-volume
              mountPath: /usr/src/app/config.json
              subPath: config.json
            resources:
              requests:
                memory: "512Mi"
                cpu: "250m"
              limits:
                memory: "1Gi"
                cpu: "500m"
          restartPolicy: OnFailure
          volumes:
          - name: config-volume
            configMap:
              name: renovate-config