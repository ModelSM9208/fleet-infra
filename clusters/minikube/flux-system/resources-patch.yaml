# Patch resources for all Flux controllers
# This overlays the upstream gotk-components.yaml without editing it
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: source-controller
  namespace: flux-system
spec:
  template:
    spec:
      containers:
        - name: manager
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
