apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: arm
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/minikube/arm
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: Secret
        name: arm-user-secrets
        optional: false
